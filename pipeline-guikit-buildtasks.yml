variables:
  - group: shared_buddy_variable_group

name: 10.0.0.$(Rev:r)

resources:
  - repo: self

pr: none

trigger:
  branches:
    include:
      - master
  paths:
    include:
      - /src/Adliance.AspNetCore.Buddy.GuiKit.BuildTasks
      - /test/Adliance.AspNetCore.Buddy.GuiKit.BuildTasks.Test

stages:
  - template: pipeline-template-build-and-push.yml
    parameters:
      project: "src/Adliance.AspNetCore.Buddy.GuiKit.BuildTasks/*.csproj"
      testProject: "test/Adliance.AspNetCore.Buddy.GuiKit.BuildTasks.Test/*.csproj"
      nugetApiKey: "$(nuget_api_key)"